<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 道依茨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", Arial, sans-serif;
        }
        :root {
            --main: #0f3460;
            --gray: #222;
            --light-gray: #f5f7fa;
            --gold: #d4af37;
        }

        header {
            background: var(--main);
            color: #fff;
            padding: 0 8%;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-wrap {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .logo small {
            font-size: 12px;
            font-weight: normal;
            display: block;
            color: var(--gold);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 32px;
            font-size: 15px;
            transition: 0.3s;
        }
        nav a:hover {
            color: var(--gold);
        }

        /* ★★★ 结果页搜索框（保留搜索能力） ★★★ */
        .search-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 4px 16px 4px 20px;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .search-wrap:focus-within {
            background: rgba(255,255,255,0.25);
            border-color: var(--gold);
        }
        .search-wrap input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            padding: 8px 0;
            width: 140px;
            transition: 0.3s;
        }
        .search-wrap input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .search-wrap input:focus {
            width: 200px;
        }
        .search-wrap button {
            background: var(--gold);
            border: none;
            color: #000;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .search-wrap button:hover {
            opacity: 0.8;
            transform: scale(0.95);
        }

        section {
            padding: 60px 8% 80px;
        }
        .title {
            text-align: center;
            margin-bottom: 40px;
        }
        .title h2 {
            font-size: 32px;
            color: var(--gray);
            margin-bottom: 12px;
        }
        .title span {
            display: inline-block;
            width: 60px;
            height: 3px;
            background: var(--gold);
        }
        .title .sub {
            display: block;
            font-size: 14px;
            color: #999;
            font-weight: normal;
            margin-top: 8px;
        }

        .product-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .pro-card {
            background: #fff;
            overflow: hidden;
            box-shadow: 0 2px 12px #e2e2e2;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }
        .pro-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px #ccc;
        }
        .pro-img {
            height: 160px;
            background: #e8edf5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #0f3460;
            font-size: 14px;
            font-weight: bold;
            background-size: cover;
            background-position: center;
        }
        .pro-img .placeholder {
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 20px;
            border-radius: 4px;
            text-align: center;
        }
        .pro-img .placeholder small {
            display: block;
            font-weight: normal;
            font-size: 11px;
            color: #666;
        }
        .pro-text {
            padding: 22px;
        }
        .pro-text h3 {
            margin-bottom: 6px;
            color: var(--gray);
            font-size: 18px;
        }
        .pro-text .en {
            font-size: 13px;
            color: #999;
        }
        .pro-text p {
            margin-top: 8px;
            color: #555;
            font-size: 14px;
        }

        .no-result {
            text-align: center;
            padding: 80px 20px;
            color: #999;
            font-size: 18px;
            grid-column: 1 / -1;
        }
        .no-result .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
        }
        .no-result a {
            color: var(--main);
            font-weight: bold;
        }

        .result-stats {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .result-stats strong {
            color: var(--main);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--main);
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            color: var(--gold);
        }

        footer {
            background: var(--gray);
            color: #aaa;
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* 弹窗样式复用 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-card {
            background: #fff;
            max-width: 720px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 40px 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .modal-card .close-btn {
            position: absolute;
            top: 16px;
            right: 22px;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            color: #888;
            transition: 0.2s;
            line-height: 1;
        }
        .modal-card .close-btn:hover {
            color: #000;
            transform: rotate(90deg);
        }
        .modal-card h2 {
            color: var(--main);
            margin-bottom: 6px;
            font-size: 28px;
        }
        .modal-card .sub-title {
            color: #888;
            font-size: 15px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .modal-card .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 24px;
            margin: 20px 0 16px;
        }
        .modal-card .spec-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #eee;
            padding: 6px 0;
        }
        .modal-card .spec-item .label {
            color: #666;
            font-weight: 500;
        }
        .modal-card .spec-item .value {
            color: #222;
            font-weight: 600;
        }
        .modal-card .desc {
            background: #f8faff;
            padding: 16px 18px;
            border-radius: 8px;
            margin: 16px 0 10px;
            color: #333;
            line-height: 1.7;
            border-left: 4px solid var(--gold);
        }
        .modal-card .btn-inline {
            background: var(--main);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-card .btn-inline:hover {
            background: var(--gold);
            color: #000;
        }

        @media (max-width: 900px) {
            .product-box {
                grid-template-columns: repeat(2, 1fr);
            }
            .search-wrap input {
                width: 100px;
            }
            .search-wrap input:focus {
                width: 140px;
            }
        }
        @media (max-width: 500px) {
            .product-box {
                grid-template-columns: 1fr;
            }
            .search-wrap {
                width: 100%;
                justify-content: space-between;
            }
            .search-wrap input {
                width: 100%;
                flex: 1;
            }
            .search-wrap input:focus {
                width: 100%;
            }
            .modal-card {
                padding: 30px 18px;
            }
            .modal-card .spec-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏（带搜索框） ===== -->
    <header>
        <div class="nav-wrap">
            <div class="logo">
                道依茨
                <small>发动机及配件供应商</small>
            </div>
            <nav>
                <a href="index.html">首页</a>
                <a href="index.html#product">型号中心</a>
                <a href="index.html#about">关于我们</a>
                <a href="index.html#case">合作案例</a>
                <a href="index.html#contact">联系我们</a>
            </nav>
            <!-- ★★★ 搜索表单：提交后跳转到自己（search.html） ★★★ -->
            <form class="search-wrap" action="search.html" method="get">
                <input type="text" name="q" placeholder="搜索型号、领域..." />
                <button type="submit">搜索</button>
            </form>
        </div>
    </header>

    <!-- ===== 搜索结果区域 ===== -->
    <section>
        <div class="title">
            <h2>搜索结果</h2>
            <span></span>
            <span class="sub">Search Results</span>
        </div>

        <!-- 统计信息 -->
        <div class="result-stats" id="resultStats">
            共找到 <strong id="countDisplay">0</strong> 个匹配型号
        </div>

        <!-- 结果列表 -->
        <div class="product-box" id="resultGrid">
            <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 无结果提示 -->
        <div class="no-result" id="noResult" style="display:none;">
            <span class="icon">🔍</span>
            没有找到匹配的型号<br>
            <small style="color:#bbb;font-size:14px;">试试其他关键词，如：BF6M、1013、农机、矿卡...</small>
            <br><br>
            <a href="index.html#product">← 返回全部型号</a>
        </div>

        <!-- 返回首页 -->
        <div style="text-align:center;margin-top:20px;">
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
    </section>

    <!-- ===== 页脚 ===== -->
    <footer>
        <p>© 2026 道依茨 版权所有</p>
        <span class="en">专业发动机及配件供应商</span>
    </footer>

    <!-- ===== 弹窗 ===== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-card">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2 id="modalTitle">发动机型号</h2>
            <div class="sub-title" id="modalSub">系列 / 类型</div>
            <div class="spec-grid" id="modalSpecs"></div>
            <div class="desc" id="modalDesc">详细描述信息</div>
            <button class="btn-inline" onclick="document.getElementById('detailModal').classList.remove('active'); window.location.href='index.html#contact';">立即询价 →</button>
        </div>
    </div>

                    },

                    keywords: ['大型挖掘机', '矿卡', '发电机组', '矿山', '大型设备']
                },
                {
                    id: 'bf4m2012',
                    name: 'BF4M2012',
                    series: '道依茨 2012 系列',
                    img: 'engine-bf4m2012.jpg',
                    spec: {

                    },

                    keywords: ['装载机', '平地机', '大型拖拉机', '农业', '工程机械']
                },
                {
                    id: 'tcd2013',

                    },

                    keywords: ['重型矿车', '超大吨位起重机', '发电机组', '矿山', '极限工况']
                },
                {
                    id: 'bf6l914',
                    name: 'BF6L914',

                        '缸径×冲程': '102×128 mm',

                    },
                    desc: 'BF6L914 经典风冷发动机，无需水箱冷却，极端环境适应性极强，结构简单，易于维修，至今仍在特种领域广泛应用。',
                    keywords: ['军用车辆', '特种车辆', '沙漠', '高温环境', '风冷']
                },
                {
                    id: 'bf4l914',
                    name: 'BF4L914',
                    series: '道依茨 914 系列',
                    img: 'engine-bf4l914.jpg',
                    spec: {

                        '额定功率': '74 kW (100 PS) @ 2500 rpm',
                        '最大扭矩': '330 N·m @ 1700 rpm',
                        '缸径×冲程': '102×128 mm',
                        '排放标准': '非道路国II',

                    },
                    desc: 'BF4L914 继承了风冷系列的耐用基因，结构紧凑，适合空间受限的设备，在农业和中小型工程机械中口碑极佳。',
                    keywords: ['小型工程机械', '农用拖拉机', '发电机组', '农业', '风冷']
                },
                {
                    id: 'tcd6.1',
                    name: 'TCD6.1',
                    series: '道依茨 6.1 系列',
                    img: 'engine-tcd6.1.jpg',
                    spec: {
                        '型式': '直列6缸 水冷 四冲程',
                        '排量': '6.1 L',
                        '额定功率': '160 kW (217 PS) @ 2200 rpm',
                        '最大扭矩': '860 N·m @ 1400 rpm',
                        '缸径×冲程': '100×130 mm',
                        '排放标准': '非道路国IV / EU Stage IV',
                        '燃油系统': '高压共轨',
                        '应用领域': '挖掘机、装载机、中型卡车'
                    },
                    desc: 'TCD6.1 是新一代道依茨动力，采用轻量化设计，功率密度高，响应快，燃油经济性显著提升，是主流工程机械的理想升级动力。',
                    keywords: ['挖掘机', '装载机', '中型卡车', '工程机械']
                }
            ];

            // ===== 获取 URL 参数 =====
            function getQueryParam(name) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(name) || '';
            }

            const keyword = getQueryParam('q').trim();

            // ===== 搜索逻辑 =====
            function searchEngines(query) {
                if (!query) return engineData; // 没关键词就返回全部

                const lowerQuery = query.toLowerCase();
                return engineData.filter(eng => {
                    // 匹配：型号名称、系列、所有规格值、描述、关键词
                    const searchableText = [
                        eng.name,
                        eng.series,
                        ...Object.values(eng.spec),
                        eng.desc,
                        ...(eng.keywords || [])
                    ].join(' ').toLowerCase();

                    return searchableText.includes(lowerQuery);
                });
            }

            const results = searchEngines(keyword);

            // ===== 渲染结果 =====
            const grid = document.getElementById('resultGrid');
            const countDisplay = document.getElementById('countDisplay');
            const stats = document.getElementById('resultStats');
            const noResult = document.getElementById('noResult');

            countDisplay.textContent = results.length;

            if (results.length === 0) {
                grid.innerHTML = '';
                noResult.style.display = 'block';
                stats.style.display = 'none';
            } else {
                noResult.style.display = 'none';
                stats.style.display = 'block';

                // 清空并渲染卡片
                grid.innerHTML = '';
                results.forEach(eng => {
                    const card = document.createElement('div');
                    card.className = 'pro-card';
                    card.addEventListener('click', function() {
                        openModal(eng);
                    });

                    const imgUrl = eng.img || 'product-default.jpg';
                    card.innerHTML = `
                        <div class="pro-img" style="background-image: url('${imgUrl}');">
                            <div class="placeholder">📷 ${eng.name} <small>点击查看配置</small></div>
                        </div>
                        <div class="pro-text">
                            <h3>${eng.name} <span class="en">${eng.series}</span></h3>
                            <p>${Object.values(eng.spec).slice(0,2).join(' · ')}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // ===== 弹窗逻辑（和首页一致） =====
            const modal = document.getElementById('detailModal');
            const closeBtn = document.getElementById('closeModalBtn');
            const modalTitle = document.getElementById('modalTitle');
            const modalSub = document.getElementById('modalSub');
            const modalSpecs = document.getElementById('modalSpecs');
            const modalDesc = document.getElementById('modalDesc');

            function openModal(eng) {
                modalTitle.textContent = eng.name;
                modalSub.textContent = eng.series;
                let specHtml = '';
                for (const [key, value] of Object.entries(eng.spec)) {
                    specHtml += `<div class="spec-item"><span class="label">${key}</span><span class="value">${value}</span></div>`;
                }
                modalSpecs.innerHTML = specHtml;
                modalDesc.textContent = eng.desc;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });

            // 如果搜索结果只有1个，自动打开弹窗？（可选，看你喜好）
            // if (results.length === 1) {
            //     setTimeout(() => openModal(results[0]), 300);
            // }

        })();
    </script>
</body>
</html>
